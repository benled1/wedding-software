<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - Sarah & Michael</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f5f0e6; font-family: Georgia, 'Times New Roman', serif;">
    <!-- Email wrapper -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f5f0e6;">
        <tr>
            <td style="padding: 40px 20px;">
                <!-- Main container -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center" style="max-width: 600px; margin: 0 auto;">

                    <!-- Header Card -->
                    <tr>
                        <td style="background-color: #faf8f3; padding: 50px 40px; text-align: center; box-shadow: 0 4px 20px rgba(61, 56, 48, 0.15);">

                            <!-- Save the Date label -->
                            <p style="font-family: Georgia, serif; font-size: 18px; color: #c4a86b; margin: 0 0 10px 0; letter-spacing: 2px;">
                                Save the Date
                            </p>

                            <!-- Couple names -->
                            <h1 style="font-family: Georgia, serif; font-size: 42px; color: #3d3830; margin: 0 0 25px 0; font-weight: normal; line-height: 1.2;">
                                Tea & Ben
                            </h1>

                            <!-- Decorative line -->
                            <div style="width: 60px; height: 2px; background-color: #c4a86b; margin: 0 auto 25px auto;"></div>

                            <!-- Date -->
                            <p style="font-family: Georgia, serif; font-size: 22px; color: #3d3830; margin: 0 0 15px 0; letter-spacing: 3px; text-transform: uppercase;">
                                August 29, 2026
                            </p>

                            <!-- Location -->
                            <p style="font-family: Georgia, serif; font-size: 16px; color: #6b6459; margin: 0; font-style: italic;">
                                Langely, British Columbia
                            </p>

                        </td>
                    </tr>

                    <!-- Spacer -->
                    <tr>
                        <td style="height: 30px;"></td>
                    </tr>

                    <!-- Preview Image (optional - replace src with your hosted image) -->
                    <tr>
                        <td style="text-align: center;">
                            <!--
                            Uncomment and replace with your preview image:
                            <img src="https://your-domain.com/preview-image.jpg"
                                 alt="Tea & Ben"
                                 width="500"
                                 style="max-width: 100%; height: auto; box-shadow: 0 4px 20px rgba(61, 56, 48, 0.15); transform: rotate(-2deg);">
                            -->
                        </td>
                    </tr>

                    <!-- Spacer -->
                    <tr>
                        <td style="height: 30px;"></td>
                    </tr>

                    <!-- CTA Button -->
                    <tr>
                        <td style="text-align: center;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                                <tr>
                                    <td style="background-color: #faf8f3; padding: 18px 45px; box-shadow: 0 4px 15px rgba(61, 56, 48, 0.15);">
                                        <!--
                                        IMPORTANT: Replace this URL with your actual save-the-date page URL
                                        -->
                                        <a href="https://your-domain.com/save-the-date"
                                           style="font-family: Georgia, serif; font-size: 18px; color: #3d3830; text-decoration: none;">
                                            View Our Save the Date
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Spacer -->
                    <tr>
                        <td style="height: 40px;"></td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="text-align: center; padding: 20px;">
                            <p style="font-family: Georgia, serif; font-size: 14px; color: #6b6459; margin: 0 0 10px 0; font-style: italic;">
                                Formal invitation to follow
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
