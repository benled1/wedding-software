<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - Tea & Ben</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #e8e4dc; font-family: 'Caveat', Georgia, 'Times New Roman', cursive;">
    <!-- Email wrapper -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #e8e4dc;">
        <tr>
            <td style="padding: 40px 20px;">
                <!-- Main container -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center" style="max-width: 600px; margin: 0 auto;">

                    <!-- Header Card - Magazine clipping style -->
                    <tr>
                        <td style="background-color: #f7f5f0; padding: 50px 40px; text-align: center; box-shadow: 4px 6px 15px rgba(45, 42, 38, 0.25); transform: rotate(-1deg);">

                            <!-- Save the Date label -->
                            <p style="font-family: 'Caveat', Georgia, cursive; font-size: 24px; color: #e07860; margin: 0 0 10px 0; letter-spacing: 1px; transform: rotate(-2deg);">
                                Save the Date
                            </p>

                            <!-- Couple names -->
                            <h1 style="font-family: 'Caveat', Georgia, cursive; font-size: 52px; color: #2d2a26; margin: 0 0 20px 0; font-weight: 700; line-height: 1; transform: rotate(1deg);">
                                Tea & Ben
                            </h1>

                            <!-- Decorative line - mustard accent -->
                            <div style="width: 80px; height: 3px; background-color: #d4a847; margin: 0 auto 20px auto; border-radius: 2px;"></div>

                            <!-- Date -->
                            <p style="font-family: 'Caveat', Georgia, cursive; font-size: 28px; color: #2d2a26; margin: 0 0 15px 0; letter-spacing: 1px; font-weight: 600;">
                                August 29, 2026
                            </p>

                            <!-- Location -->
                            <p style="font-family: 'Caveat', Georgia, cursive; font-size: 20px; color: #5a554d; margin: 0;">
                                Langley, British Columbia
                            </p>

                        </td>
                    </tr>

                    <!-- Spacer -->
                    <tr>
                        <td style="height: 30px;"></td>
                    </tr>

                    <!-- Preview Image (optional - replace src with your hosted image) -->
                    <tr>
                        <td style="text-align: center;">
                            <!--
                            Uncomment and replace with your preview image:
                            <img src="https://your-domain.com/preview-image.jpg"
                                 alt="Tea & Ben"
                                 width="500"
                                 style="max-width: 100%; height: auto; box-shadow: 4px 6px 12px rgba(45, 42, 38, 0.3); transform: rotate(-2deg);">
                            -->
                        </td>
                    </tr>

                    <!-- Spacer -->
                    <tr>
                        <td style="height: 30px;"></td>
                    </tr>

                    <!-- CTA Button - Scrappy paper style -->
                    <tr>
                        <td style="text-align: center;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                                <tr>
                                    <td style="background-color: #f7f5f0; padding: 18px 45px; box-shadow: 3px 4px 10px rgba(45, 42, 38, 0.2); transform: rotate(-2deg);">
                                        <!--
                                        IMPORTANT: Replace this URL with your actual save-the-date page URL
                                        -->
                                        <a href="https://benled1.github.io/wedding-software/"
                                           style="font-family: 'Caveat', Georgia, cursive; font-size: 22px; color: #2d2a26; text-decoration: none; font-weight: 600;">
                                            View Our Save the Date
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Spacer -->
                    <tr>
                        <td style="height: 40px;"></td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="text-align: center; padding: 20px;">
                            <p style="font-family: 'Caveat', Georgia, cursive; font-size: 18px; color: #5a554d; margin: 0 0 10px 0;">
                                Formal invitation to follow
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
